# Configuration Dependabot — mises à jour de versions automatiques.
# Doc : https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Dépendances Dart / Flutter (pubspec.yaml, à la racine)
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Regroupe mineures + patch en une seule PR (moins de bruit)
      dart-mineures:
        update-types:
          - "minor"
          - "patch"

  # NB : l'écosystème "gradle" est volontairement EXCLU. Sur un projet Flutter,
  # les versions AGP / Kotlin / Gradle sont gérées par Flutter et doivent rester
  # alignées avec la version du SDK -> les bumps isolés de Dependabot cassent le
  # build sans apport sécurité réel. On laisse Flutter gérer la toolchain Android.

  # Actions GitHub utilisées dans .github/workflows/*.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
