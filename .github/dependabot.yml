# Configuration Dependabot — mises à jour de versions automatiques.
# Doc : https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Dépendances Dart / Flutter (pubspec.yaml, à la racine)
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Regroupe mineures + patch en une seule PR (moins de bruit)
      dart-mineures:
        update-types:
          - "minor"
          - "patch"

  # Dépendances Gradle du module Android (manifestes sous /android, PAS à la racine)
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Actions GitHub utilisées dans .github/workflows/*.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
